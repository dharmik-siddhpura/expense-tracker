<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">💸</div>
      <div>
        <h1>ExpenseTracker</h1>
        <p style="font-size:.75rem;color:var(--text-muted)">Smart Finance Management</p>
      </div>
    </div>
    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Sign In</button>
    </form>
    <div class="auth-footer">
      <p>Demo: <strong>demo@expense.com</strong> / <strong>demo1234</strong></p>
      <p style="margin-top:.5rem">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>
  </div>
</div>

<script type="module">
  import { initLogin } from './js/auth.js';
  initLogin();
</script>
</body>
</html>
