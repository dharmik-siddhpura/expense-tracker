<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker — Register</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">💸</div>
      <div><h1>Create Account</h1><p style="font-size:.75rem;color:var(--text-muted)">Start tracking your expenses</p></div>
    </div>
    <form class="auth-form" id="register-form">
      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" type="text" name="name" placeholder="Dharmik Siddhpura" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password (min 6 chars)</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select class="form-control" name="currency">
          <option value="INR">🇮🇳 INR — Indian Rupee</option>
          <option value="USD">🇺🇸 USD — US Dollar</option>
          <option value="EUR">🇪🇺 EUR — Euro</option>
          <option value="GBP">🇬🇧 GBP — British Pound</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Create Account</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="index.html">Sign in</a></div>
  </div>
</div>

<script type="module">
  import { initRegister } from './js/auth.js';
  initRegister();
</script>
</body>
</html>
