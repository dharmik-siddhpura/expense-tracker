<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Budget — Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="toast-container"></div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">💸</div><div><div class="brand-name">ExpenseTracker</div><div class="brand-sub">Finance Manager</div></div></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"    class="nav-link">📊 Dashboard</a>
      <a href="transactions.html" class="nav-link">💳 Transactions</a>
      <a href="budget.html"       class="nav-link active">🎯 Budget</a>
      <a href="reports.html"      class="nav-link">📈 Reports</a>
      <a href="profile.html"      class="nav-link">👤 Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip"><div class="user-avatar" id="user-avatar">D</div></div>
      <button class="btn btn-outline btn-sm w-full mt-2" id="logout-btn" style="justify-content:center">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div><h2 class="page-title">Budget Planner</h2><p class="page-sub">Set and track your monthly spending limits</p></div>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-sm" id="theme-toggle">🌙</button>
        <button class="btn btn-primary" id="add-btn">+ Set Budget</button>
      </div>
    </div>

    <div class="stats-grid" id="budget-grid"><div class="spinner"></div></div>

    <footer class="app-footer" style="margin-top:2rem">Developed by <strong>Dharmik Siddhpura</strong> | MCA Student | <a href="https://github.com/dharmik-siddhpura" target="_blank">GitHub</a> | <a href="https://www.linkedin.com/in/dharmik-siddhpura/" target="_blank">LinkedIn</a></footer>
  </main>
</div>

<div class="modal-overlay hidden" id="budget-modal">
  <div class="modal-box">
    <div class="modal-header"><h3>Set Monthly Budget</h3><button class="modal-close" id="modal-close">✕</button></div>
    <form id="budget-form" style="display:flex;flex-direction:column;gap:.9rem">
      <div class="form-group"><label>Category</label>
        <select class="form-control" name="category">
          <option>Food</option><option>Transport</option><option>Entertainment</option>
          <option>Shopping</option><option>Health</option><option>Bills</option><option>Education</option><option>Other</option>
        </select></div>
      <div class="form-group"><label>Budget Limit (₹)</label>
        <input class="form-control" type="number" name="limit" min="1" placeholder="e.g. 5000" required/></div>
      <button type="submit" class="btn btn-primary" style="justify-content:center">Set Budget</button>
    </form>
  </div>
</div>
<script type="module" src="js/budget.js"></script>
</body>
</html>
